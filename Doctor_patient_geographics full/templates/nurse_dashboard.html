<!DOCTYPE html>
<html>
<head>
    <title>Nurse Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            /* background image from Flask static folder */
            background-image: url("{{ url_for('static', filename='images/bg.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Navbar styling */
        nav {
            background-color: rgba(25,27,31,0.9); /* semi-transparent for bg image */
            padding: 10px 20px;
            display: flex;
            align-items: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-right: 15px;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
        }

        nav a:hover {
            background-color: #101113ff;
        }

        nav a.logout {
            background-color: #dc3545;
        }

        nav a.logout:hover {
            background-color: #c82333;
        }

        nav .brand {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            margin-right: auto;
        }

        h2 {
            color: #fff;
            text-align: center;
            margin: 20px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
        }

        /* Product card styling */
        .card {
            background-color: rgba(255,255,255,0.95); /* slightly transparent for bg image */
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            padding: 20px;
            margin: 20px auto;
            max-width: 400px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .card-title {
            font-size: 22px;
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 10px;
            text-align: center;
        }

        .card p {
            color: #343a40;
            line-height: 1.6;
            text-align: center;
        }

    </style>
</head>
<body>

    <nav>
        <div class="brand">Nurse Dashboard</div>
        <a href="/nurse_dashboard">Home</a>
        <a href="/add_report">Add Report</a>
        <a href="/view_report_enc_table">View Encrypted Reports</a>
        <a href="/logout" class="logout">Logout</a>
    </nav>

    <h2>Nurse Dashboard</h2>

    <div class="card">
        <div class="card-title">Add Report</div>
        <p>Submit medical reports for registered patients, including vital signs such as temperature, pulse rate, SPO2, height, and weight.</p>
    </div>

</body>
</html>
